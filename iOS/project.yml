name: Pawprint
options:
  bundleIdPrefix: com.shimondeitel.vetvisit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pawprint:
    type: application
    platform: iOS
    sources:
      - path: Pawprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vetvisit
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pawprint/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PawprintTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PawprintTests
      - path: Pawprint.storekit
    dependencies:
      - target: Pawprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vetvisit.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PawprintUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PawprintUITests
    dependencies:
      - target: Pawprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vetvisit.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pawprint:
    build:
      targets:
        Pawprint: all
        PawprintTests: [test]
        PawprintUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pawprint.storekit
    test:
      config: Debug
      storeKitConfiguration: Pawprint.storekit
      targets:
        - PawprintTests
        - PawprintUITests
    archive:
      config: Release
